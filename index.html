<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NER · Gemma 4 Local</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
–bg:#080c10;
–s1:#0d1318;
–s2:#111a22;
–border:#1a2632;
–border2:#223040;
–acc:#00d4ff;
–acc2:#0099cc;
–acc-dim:rgba(0,212,255,.08);
–acc-glow:rgba(0,212,255,.18);
–ok:#00e5a0;
–warn:#ffb020;
–err:#ff4757;
–tx:#dce8f0;
–tx2:#6a8ea8;
–tx3:#2a4560;

–c-pessoa:#a78bfa;
–c-empresa:#fb923c;
–c-endereco:#38bdf8;
–c-cidade:#34d399;
–c-estado:#fbbf24;
–c-pais:#f472b6;
–c-nasc:#c084fc;
–c-cpf:#2dd4bf;
–c-cnpj:#f97316;
–c-rastreio:#4ade80;
–c-cte:#f87171;
–c-nfe:#60a5fa;
}

html,body{height:100%;background:var(–bg);color:var(–tx);font-family:‘Syne’,sans-serif;font-size:14px;line-height:1.6;overflow-x:hidden}

/* scanline overlay */
body::after{
content:’’;position:fixed;inset:0;pointer-events:none;z-index:999;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
}

/* bg dots */
body::before{
content:’’;position:fixed;inset:0;pointer-events:none;z-index:0;
background-image:radial-gradient(rgba(0,212,255,.06) 1px,transparent 1px);
background-size:28px 28px;
}

.wrap{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:32px 20px 80px}

/* ── HEADER ── */
header{margin-bottom:40px}

.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}

.logo{display:flex;flex-direction:column;gap:2px}
.logo-sup{font-family:‘IBM Plex Mono’,monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(–acc);opacity:.7}
h1{font-size:clamp(24px,5vw,38px);font-weight:800;letter-spacing:-.04em;line-height:1.05}
h1 em{font-style:normal;color:var(–acc)}

.chip{
display:inline-flex;align-items:center;gap:7px;
padding:7px 14px;border-radius:999px;
background:var(–acc-dim);border:1px solid var(–acc2);
font-family:‘IBM Plex Mono’,monospace;font-size:10px;letter-spacing:.08em;color:var(–acc);
white-space:nowrap;flex-shrink:0
}
.chip-dot{width:7px;height:7px;background:var(–acc);border-radius:50%}

/* ── MODEL STATUS BAR ── */
#statusBar{
margin-top:20px;padding:12px 16px;
background:var(–s1);border:1px solid var(–border);border-radius:10px;
display:flex;align-items:center;gap:12px;flex-wrap:wrap
}
.sb-label{font-family:‘IBM Plex Mono’,monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(–tx2);white-space:nowrap}
.sb-model{font-family:‘IBM Plex Mono’,monospace;font-size:12px;color:var(–acc);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-state{font-family:‘IBM Plex Mono’,monospace;font-size:11px;padding:3px 10px;border-radius:999px;white-space:nowrap}
.state-idle{background:rgba(106,142,168,.12);color:var(–tx2);border:1px solid var(–border2)}
.state-loading{background:rgba(255,176,32,.1);color:var(–warn);border:1px solid rgba(255,176,32,.3)}
.state-ready{background:rgba(0,229,160,.1);color:var(–ok);border:1px solid rgba(0,229,160,.3)}
.state-error{background:rgba(255,71,87,.1);color:var(–err);border:1px solid rgba(255,71,87,.3)}
.state-running{background:rgba(0,212,255,.1);color:var(–acc);border:1px solid rgba(0,212,255,.3)}

/* progress bar */
#progressWrap{width:100%;height:3px;background:var(–border);border-radius:3px;overflow:hidden;display:none}
#progressBar{height:100%;background:linear-gradient(90deg,var(–acc2),var(–acc));width:0%;transition:width .3s;border-radius:3px}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:620px){.grid{grid-template-columns:1fr}}

/* ── PANEL ── */
.panel{background:var(–s1);border:1px solid var(–border);border-radius:12px;overflow:hidden;transition:border-color .2s}
.panel:focus-within{border-color:var(–acc2);box-shadow:0 0 0 1px var(–acc2),0 0 24px var(–acc-glow)}

.ph{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-bottom:1px solid var(–border);background:var(–s2)}
.ph-title{font-family:‘IBM Plex Mono’,monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(–tx2)}
.ph-meta{font-family:‘IBM Plex Mono’,monospace;font-size:10px;color:var(–tx3)}

textarea{
display:block;width:100%;min-height:280px;background:transparent;border:none;outline:none;
resize:vertical;color:var(–tx);font-family:‘IBM Plex Mono’,monospace;font-size:12.5px;
line-height:1.75;padding:16px;caret-color:var(–acc)
}
textarea::placeholder{color:var(–tx3)}

/* ── INFO PANEL ── */
.info-panel{display:flex;flex-direction:column;gap:10px}

.model-selector-card{background:var(–s1);border:1px solid var(–border);border-radius:10px;overflow:hidden}
.model-selector-card .ph{border-bottom:1px solid var(–border)}

.model-opts{padding:10px 14px;display:flex;flex-direction:column;gap:6px}
.model-opt{
display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;
cursor:pointer;transition:background .15s;border:1px solid transparent
}
.model-opt:hover{background:var(–s2)}
.model-opt.active{background:var(–acc-dim);border-color:var(–acc2)}
.model-opt input{accent-color:var(–acc);cursor:pointer}
.model-opt-name{font-family:‘IBM Plex Mono’,monospace;font-size:11px;color:var(–tx);flex:1}
.model-opt-size{font-family:‘IBM Plex Mono’,monospace;font-size:10px;color:var(–tx2);white-space:nowrap}

/* ── ACTIONS ── */
.actions{grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}

.btn{
display:inline-flex;align-items:center;gap:8px;
padding:12px 28px;border-radius:8px;cursor:pointer;
font-family:‘Syne’,sans-serif;font-size:13px;font-weight:600;letter-spacing:.04em;
border:none;transition:all .15s;position:relative;overflow:hidden
}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:var(–acc);color:#080c10}
.btn-primary::before{content:’’;position:absolute;inset:0;background:rgba(255,255,255,.15);opacity:0;transition:.15s}
.btn-primary:hover:not(:disabled)::before{opacity:1}
.btn-primary:active:not(:disabled){transform:scale(.98)}
.btn-ghost{background:transparent;color:var(–tx2);border:1px solid var(–border2)}
.btn-ghost:hover:not(:disabled){border-color:var(–tx2);color:var(–tx)}
.btn-load{background:var(–s2);color:var(–acc);border:1px solid var(–acc2)}
.btn-load:hover:not(:disabled){background:var(–acc-dim)}

.spinner{width:14px;height:14px;border:2px solid rgba(8,12,16,.3);border-top-color:#080c10;border-radius:50%;animation:spin .7s linear infinite}
.spinner-acc{border-color:rgba(0,212,255,.2);border-top-color:var(–acc)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESULTS ── */
.results{grid-column:1/-1}

.entities-grid{
padding:16px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:12px
}

.eg{
background:var(–s2);border:1px solid var(–border);border-radius:9px;overflow:hidden;
animation:fadeUp .3s ease both
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.eg-hdr{display:flex;align-items:center;gap:7px;padding:9px 12px;border-bottom:1px solid var(–border)}
.eg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.eg-type{font-family:‘IBM Plex Mono’,monospace;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(–tx2);flex:1}
.eg-ct{font-family:‘IBM Plex Mono’,monospace;font-size:9px;padding:2px 6px;border-radius:999px;background:var(–acc-dim);color:var(–acc)}
.eg-vals{padding:9px 12px;display:flex;flex-direction:column;gap:5px}
.eg-val{font-family:‘IBM Plex Mono’,monospace;font-size:11.5px;color:var(–tx);display:flex;align-items:flex-start;gap:6px;line-height:1.4}
.eg-val::before{content:’›’;color:var(–tx3);flex-shrink:0}
.eg-empty{font-family:‘IBM Plex Mono’,monospace;font-size:11px;color:var(–tx3);padding:9px 12px;font-style:italic}

/* highlighted text */
.hl-panel{grid-column:1/-1}
.hl-inner{padding:16px;font-family:‘IBM Plex Mono’,monospace;font-size:12.5px;line-height:2;white-space:pre-wrap;word-break:break-word}

mark{
padding:1px 5px;border-radius:3px;font-weight:500;cursor:default;
}

/* empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:8px;color:var(–tx3)}
.empty-icon{font-size:28px;opacity:.4}
.empty-txt{font-family:‘IBM Plex Mono’,monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase}

/* error */
.err-box{
grid-column:1/-1;display:flex;align-items:flex-start;gap:10px;
padding:12px 15px;background:rgba(255,71,87,.06);border:1px solid rgba(255,71,87,.25);
border-radius:8px;color:var(–err);font-family:‘IBM Plex Mono’,monospace;font-size:11.5px;
line-height:1.5;display:none
}

/* loading state in results */
.loading-anim{display:flex;align-items:center;justify-content:center;gap:5px;padding:40px}
.lb{width:4px;height:4px;background:var(–acc);border-radius:50%;animation:lbounce 1.2s ease-in-out infinite}
.lb:nth-child(1){animation-delay:0s}
.lb:nth-child(2){animation-delay:.15s}
.lb:nth-child(3){animation-delay:.3s}
.lb:nth-child(4){animation-delay:.45s}
@keyframes lbounce{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1.2);opacity:1}}

/* copy btn */
.btn-copy{
padding:4px 10px;background:transparent;border:1px solid var(–border2);border-radius:5px;
color:var(–tx2);font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:.08em;
cursor:pointer;transition:all .15s
}
.btn-copy:hover{border-color:var(–acc);color:var(–acc)}

/* streaming output */
#streamBox{
grid-column:1/-1;
background:var(–s1);border:1px solid var(–border);border-radius:12px;
overflow:hidden;display:none
}
#streamInner{
padding:14px 16px;font-family:‘IBM Plex Mono’,monospace;font-size:11.5px;
color:var(–tx2);line-height:1.7;max-height:160px;overflow-y:auto;white-space:pre-wrap;
word-break:break-word
}
</style>

</head>

<script type="module">
import {
  AutoProcessor,
  Gemma4ForConditionalGeneration,
  TextStreamer
} from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.2.0';

// ── ENTITY CONFIG ──────────────────────────────────────────────────
const ENTITIES = [
  {key:'pessoa',    label:'Pessoa',          color:'#a78bfa'},
  {key:'empresa',   label:'Empresa',         color:'#fb923c'},
  {key:'endereco',  label:'Endereço',        color:'#38bdf8'},
  {key:'cidade',    label:'Cidade',          color:'#34d399'},
  {key:'estado',    label:'Estado',          color:'#fbbf24'},
  {key:'pais',      label:'País',            color:'#f472b6'},
  {key:'nascimento',label:'Ano Nasc.',       color:'#c084fc'},
  {key:'cpf',       label:'CPF',             color:'#2dd4bf'},
  {key:'cnpj',      label:'CNPJ',            color:'#f97316'},
  {key:'rastreio',  label:'Rastreio Correios',color:'#4ade80'},
  {key:'cte',       label:'CT-e',            color:'#f87171'},
  {key:'nfe',       label:'NF-e',            color:'#60a5fa'},
];

const PROMPT_SYSTEM = `Você é um extrator de entidades nomeadas especializado em textos brasileiros.
Retorne SOMENTE um objeto JSON válido, sem markdown, sem explicações, sem texto fora do JSON.
Formato EXATO (todos os campos obrigatórios):
{"pessoa":[],"empresa":[],"endereco":[],"cidade":[],"estado":[],"pais":[],"nascimento":[],"cpf":[],"cnpj":[],"rastreio":[],"cte":[],"nfe":[]}
Regras: preserve valores exatamente como aparecem; sem duplicatas por chave; arrays vazios se não encontrado.`;

// ── DOM ────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const textInput   = $('textInput');
const charCount   = $('charCount');
const btnLoad     = $('btnLoad');
const btnExtract  = $('btnExtract');
const btnClear    = $('btnClear');
const btnCopy     = $('btnCopy');
const sbModel     = $('sbModel');
const sbState     = $('sbState');
const progressWrap= $('progressWrap');
const progressBar = $('progressBar');
const errBox      = $('errBox');
const streamBox   = $('streamBox');
const streamInner = $('streamInner');
const resultsPanel= $('resultsPanel');
const resultsInner= $('resultsInner');
const hlPanel     = $('hlPanel');
const hlInner     = $('hlInner');
const loadIcon    = $('loadIcon');
const loadTxt     = $('loadTxt');
const extractIcon = $('extractIcon');
const extractTxt  = $('extractTxt');

// ── STATE ──────────────────────────────────────────────────────────
let processor = null;
let model     = null;
let isLoading = false;
let isRunning = false;
let lastResult= null;
let currentModelId = 'onnx-community/gemma-4-E2B-it-ONNX';

// ── UTILS ──────────────────────────────────────────────────────────
function setState(s, label){
  sbState.className = 'sb-state state-' + s;
  sbState.textContent = label;
}

function showErr(msg){ errBox.style.display='flex'; errBox.textContent='⚠ '+msg }
function hideErr(){ errBox.style.display='none' }

function setLoadBtn(loading){
  btnLoad.disabled = loading || isRunning;
  loadIcon.textContent = loading ? '' : '⬇';
  loadTxt.textContent  = loading ? 'Carregando...' : 'Carregar Modelo';
  if(loading) loadIcon.innerHTML = '<div class="spinner spinner-acc"></div>';
}

function setExtractBtn(running){
  btnExtract.disabled = running || !model;
  extractIcon.textContent = running ? '' : '⚡';
  extractTxt.textContent  = running ? 'Processando...' : 'Extrair Entidades';
  if(running) extractIcon.innerHTML = '<div class="spinner"></div>';
}

// Update model-opt active state
document.querySelectorAll('.model-opt').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.model-opt').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    currentModelId = el.querySelector('input').value;
    sbModel.textContent = currentModelId;
    // reset model if switching
    if(model){ model=null; processor=null; setState('idle','Não carregado'); btnExtract.disabled=true; }
  });
});

textInput.addEventListener('input', () => {
  charCount.textContent = textInput.value.length + ' chars';
});

btnClear.addEventListener('click', () => {
  textInput.value=''; charCount.textContent='0 chars';
  resultsPanel.style.display='none';
  hlPanel.style.display='none';
  streamBox.style.display='none';
  hideErr(); lastResult=null;
});

btnCopy.addEventListener('click', () => {
  if(!lastResult) return;
  navigator.clipboard.writeText(JSON.stringify(lastResult,null,2)).then(() => {
    btnCopy.textContent='Copiado!';
    setTimeout(()=>btnCopy.textContent='Copiar JSON',2000);
  });
});

// ── LOAD MODEL ─────────────────────────────────────────────────────
btnLoad.addEventListener('click', loadModel);

async function loadModel(){
  if(isLoading) return;
  isLoading = true;
  hideErr();
  setLoadBtn(true);
  setState('loading','Carregando...');
  progressWrap.style.display='block';
  progressBar.style.width='0%';

  try {
    const mid = currentModelId;

    let lastPct = 0;
    const onProgress = (info) => {
      // v4 progress_callback receives objects with different shapes
      if (info.status === 'progress') {
        const pct = Math.round(info.progress || 0);
        if (pct > lastPct) { lastPct = pct; progressBar.style.width = pct + '%'; }
        sbState.textContent = `Baixando... ${pct}%`;
      } else if (info.status === 'progress_total') {
        const pct = Math.round(info.progress || 0);
        if (pct > lastPct) { lastPct = pct; progressBar.style.width = pct + '%'; }
        sbState.textContent = `Carregando... ${pct}%`;
      } else if (info.status === 'initiate') {
        sbState.textContent = `Iniciando: ${info.file || ''}`;
      } else if (info.status === 'loading') {
        sbState.textContent = 'Carregando pesos...';
      } else if (info.status === 'done') {
        sbState.textContent = 'Processando...';
      }
    };

    processor = await AutoProcessor.from_pretrained(mid);

    model = await Gemma4ForConditionalGeneration.from_pretrained(mid, {
      dtype: 'q4f16',
      device: 'webgpu',
      progress_callback: onProgress,
    });

    progressBar.style.width='100%';
    setState('ready','Pronto ✓');
    btnExtract.disabled = false;
    btnLoad.textContent = '✓ Recarregar';
    loadIcon.textContent = '✓';
    loadTxt.textContent = 'Recarregar';

  } catch(e) {
    console.error(e);
    setState('error','Erro');
    showErr(e.message || 'Falha ao carregar o modelo. Verifique se seu browser suporta WebGPU.');
  } finally {
    isLoading = false;
    setLoadBtn(false);
    setTimeout(()=>{ progressWrap.style.display='none'; progressBar.style.width='0%'; }, 1500);
  }
}

// ── EXTRACT ────────────────────────────────────────────────────────
btnExtract.addEventListener('click', runExtract);

async function runExtract(){
  const text = textInput.value.trim();
  if(!text){ showErr('Insira um texto para análise.'); return; }
  if(!model){ showErr('Carregue o modelo primeiro.'); return; }
  if(isRunning) return;

  isRunning = true;
  hideErr();
  setExtractBtn(true);
  setState('running','Inferindo...');

  // show stream box
  streamBox.style.display='block';
  streamInner.textContent = '';

  // Show loading in results
  resultsPanel.style.display='block';
  resultsInner.innerHTML = `
    <div class="loading-anim">
      <div class="lb"></div><div class="lb"></div>
      <div class="lb"></div><div class="lb"></div>
    </div>`;
  hlPanel.style.display='none';

  try {
    const userContent = `${PROMPT_SYSTEM}\n\nTexto:\n${text}`;

    const messages = [
      { role:'user', content: userContent }
    ];

    const prompt = processor.apply_chat_template(messages, {
      enable_thinking: false,
      add_generation_prompt: true,
    });

    const inputs = await processor(prompt);

    let generated = '';

    const streamer = new TextStreamer(processor.tokenizer, {
      skip_prompt: true,
      skip_special_tokens: true,
      callback_function: (chunk) => {
        generated += chunk;
        streamInner.textContent = generated;
        streamInner.scrollTop = streamInner.scrollHeight;
      }
    });

    await model.generate({
      ...inputs,
      max_new_tokens: 512,
      do_sample: false,
      streamer,
    });

    // parse result
    const parsed = parseJSON(generated);
    if(parsed){
      lastResult = parsed;
      renderResults(parsed, text);
    } else {
      showErr('Modelo retornou resposta inválida. Tente novamente.');
      resultsPanel.style.display='none';
    }

  } catch(e){
    console.error(e);
    showErr(e.message || 'Erro durante a inferência.');
    resultsPanel.style.display='none';
  } finally {
    isRunning = false;
    setExtractBtn(false);
    setState('ready','Pronto ✓');
  }
}

// ── PARSE JSON ─────────────────────────────────────────────────────
function parseJSON(raw){
  try{
    let t = raw.trim()
      .replace(/^```[a-z]*\n?/i,'').replace(/```$/,'').trim();
    // strip thinking tags if present
    t = t.replace(/<\|channel>thought[\s\S]*?<channel\|>/g,'').trim();
    const m = t.match(/\{[\s\S]*\}/);
    if(m) return JSON.parse(m[0]);
  }catch(e){ console.warn('JSON parse failed:',e) }
  return null;
}

// ── RENDER ─────────────────────────────────────────────────────────
function renderResults(data, originalText){
  resultsPanel.style.display='block';

  const grid = document.createElement('div');
  grid.className='entities-grid';

  ENTITIES.forEach((et,i) => {
    const vals = data[et.key] || [];
    const card = document.createElement('div');
    card.className='eg';
    card.style.animationDelay=(i*.04)+'s';

    card.innerHTML=`
      <div class="eg-hdr">
        <span class="eg-dot" style="background:${et.color}"></span>
        <span class="eg-type">${et.label}</span>
        <span class="eg-ct">${vals.length}</span>
      </div>`;

    if(vals.length===0){
      card.innerHTML+=`<div class="eg-empty">nenhuma encontrada</div>`;
    } else {
      const vd=document.createElement('div');
      vd.className='eg-vals';
      vals.forEach(v=>{
        const el=document.createElement('div');
        el.className='eg-val';
        el.textContent=v;
        vd.appendChild(el);
      });
      card.appendChild(vd);
    }

    grid.appendChild(card);
  });

  resultsInner.innerHTML='';
  resultsInner.appendChild(grid);

  renderHighlight(originalText, data);
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderHighlight(text, data){
  const spans=[];
  ENTITIES.forEach(et=>{
    (data[et.key]||[]).forEach(val=>{
      if(!val||val.length<2) return;
      const re=new RegExp(val.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
      let m;
      while((m=re.exec(text))!==null){
        spans.push({start:m.index,end:m.index+m[0].length,label:et.label,color:et.color,val:m[0]});
      }
    });
  });

  spans.sort((a,b)=>a.start-b.start);
  const clean=[];
  let cursor=0;
  for(const sp of spans){
    if(sp.start>=cursor){ clean.push(sp); cursor=sp.end; }
  }

  let html='',pos=0;
  for(const sp of clean){
    if(sp.start>pos) html+=escHtml(text.slice(pos,sp.start));
    html+=`<mark title="${sp.label}" style="background:${sp.color}22;color:${sp.color};border:1px solid ${sp.color}44">${escHtml(sp.val)}<sup style="font-size:8px;opacity:.7;margin-left:2px">${sp.label}</sup></mark>`;
    pos=sp.end;
  }
  if(pos<text.length) html+=escHtml(text.slice(pos));

  hlInner.innerHTML=html;
  hlPanel.style.display='block';
}
